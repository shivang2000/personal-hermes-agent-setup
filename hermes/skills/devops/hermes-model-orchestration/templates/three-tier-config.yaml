# Copy relevant sections into ~/.hermes/config.yaml.
# Merge; do not overwrite unrelated configuration.
# Confirm live model IDs with `hermes model --refresh` first.

model:
  provider: ollama-cloud
  default: minimax-m3
  base_url: https://ollama.com/v1

credential_pool_strategies:REDACTED_SET_LOCALLY
  ollama-cloud: round_robin

# Availability recovery only. Use a different provider for quota diversity.
fallback_providers:
  - provider: openrouter
    model: z-ai/glm-5.2
  - provider: openai-codex
    model: gpt-5.6-sol

delegation:
  provider: ollama-cloud
  model: glm-5.2
  max_iterations: 50
  max_concurrent_children: 3
  max_async_children: 3
  max_spawn_depth: 1
  reasoning_effort: high

model_aliases:
  light:
    provider: ollama-cloud
    model: minimax-m3
  intensive:
    provider: ollama-cloud
    model: glm-5.2
  extreme:
    provider: moa
    model: extreme

auxiliary:
  title_generation:
    provider: ollama-cloud
    model: minimax-m3
    timeout: 30
  compression:
    provider: ollama-cloud
    model: minimax-m3
    timeout: 120
    fallback_chain:
      - provider: openrouter
        model: minimax/minimax-m3
  web_extract:
    provider: ollama-cloud
    model: minimax-m3
    timeout: 360
  skills_hub:
    provider: ollama-cloud
    model: minimax-m3
    timeout: 30
  approval:
    provider: ollama-cloud
    model: minimax-m3
    timeout: 30
  mcp:
    provider: ollama-cloud
    model: minimax-m3
    timeout: 30
  # Leave vision on auto until capability is verified.
  vision:
    provider: auto
    model: ''

moa:
  default_preset: extreme
  presets:
    extreme:
      reference_models:
        - provider: openai-codex
          model: gpt-5.6-sol
      aggregator:
        provider: openrouter
        model: anthropic/claude-opus-4.8
      reference_max_tokens: REDACTED_SET_LOCALLY
      max_tokens: REDACTED_SET_LOCALLY
      enabled: true
